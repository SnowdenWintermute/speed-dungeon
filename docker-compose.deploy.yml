# speed-dungeon's own compose project, separate from the box-level one that still runs the
# personal site, roguelike-racing and snowauth. Secrets and urls come from .env.deploy
# (gitignored); only container-network wiring and per-role identity live here.
#
# Host ports are box-global. Taken by the other project: 3000-3002, 8082, 8084.
#
# The lobby needs to reach snowauth, which lives in that other compose project, so it joins an
# external network both projects share:  docker network create speed-dungeon-shared

x-server-common: &server-common
  image: snowd3n/speed-dungeon:server
  build:
    context: .
    dockerfile: dockerfiles/server.Dockerfile
    target: server
  restart: unless-stopped
  env_file:
    - .env.deploy
  depends_on:
    speed-dungeon-postgres:
      condition: service_healthy
    speed-dungeon-valkey:
      condition: service_healthy

x-infra-env: &infra-env
  POSTGRES_HOST: speed-dungeon-postgres
  POSTGRES_PORT: 5432
  VALKEY_URL: redis://speed-dungeon-valkey:6379

services:
  speed-dungeon-postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.deploy
    volumes:
      - speed-dungeon-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  speed-dungeon-valkey:
    image: valkey/valkey
    restart: unless-stopped
    volumes:
      - speed-dungeon-valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  speed-dungeon-asset-server:
    image: snowd3n/speed-dungeon:asset-server
    build:
      context: .
      dockerfile: dockerfiles/server.Dockerfile
      target: asset-server
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      ASSET_SERVER_PORT: 8100
    ports:
      - 8087:8100
    healthcheck:
      # the port only opens after the gltf analysis finishes, so this also gates the game servers
      test: ["CMD", "wget", "-qO-", "http://localhost:8100/api/asset-manifest"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  speed-dungeon-lobby:
    <<: *server-common
    command: ["node", "dist/entrypoints/lobby.js"]
    environment:
      <<: *infra-env
      LOBBY_PORT: 8080
      # exactly one lobby may run these: node-pg-migrate exits 1 on a lost lock race, and
      # loadLadderIntoKvStore deletes and rebuilds the ladder key
      RUN_MIGRATIONS_ON_BOOT: "true"
    ports:
      - 8083:8080
    networks:
      - default
      - speed-dungeon-shared

  speed-dungeon-game-server-1:
    <<: *server-common
    command: ["node", "dist/entrypoints/game-server.js"]
    environment:
      <<: *infra-env
      GAME_SERVER_PORT: 8090
      GAME_SERVER_NAME: Lindblum
      # what clients are told to connect to, so it must be the public proxy url
      GAME_SERVER_PUBLIC_URL: wss://roguelikeracing.com/game-server-1
      ASSET_SERVER_URL: http://speed-dungeon-asset-server:8100/api
    ports:
      - 8085:8090
    depends_on:
      speed-dungeon-postgres:
        condition: service_healthy
      speed-dungeon-valkey:
        condition: service_healthy
      speed-dungeon-asset-server:
        condition: service_healthy
    healthcheck:
      # a raw ws server with no request listener never answers plain HTTP, so check the socket
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(8090,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  speed-dungeon-game-server-2:
    <<: *server-common
    command: ["node", "dist/entrypoints/game-server.js"]
    environment:
      <<: *infra-env
      GAME_SERVER_PORT: 8090
      GAME_SERVER_NAME: Alexandria
      GAME_SERVER_PUBLIC_URL: wss://roguelikeracing.com/game-server-2
      ASSET_SERVER_URL: http://speed-dungeon-asset-server:8100/api
    ports:
      - 8086:8090
    depends_on:
      speed-dungeon-postgres:
        condition: service_healthy
      speed-dungeon-valkey:
        condition: service_healthy
      speed-dungeon-asset-server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(8090,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  speed-dungeon-postgres-data:
  speed-dungeon-valkey-data:

networks:
  speed-dungeon-shared:
    external: true
