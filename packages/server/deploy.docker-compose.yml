# format 2.x (not 3.x): this box is deployed with docker-compose v1
version: "2.2"
services:
    next-client:
        image: snowd3n/mike-silverman:client
        restart: unless-stopped
        environment:
             - NODE_ENV=production
        ports:
             - 3000:3000
    # speed-dungeon (client, server, postgres, valkey) moved to its own compose project:
    # the repo-root docker-compose.deploy.yml. Do not re-add them here. The old
    # speed_dungeon_pg_volume / speed_dungeon_valkey_volume still hold the pre-split data on
    # disk — migrate it into the new project's volumes before bringing the new stack up (or
    # point the new compose at these volumes). See deployment-notes.md "box-level cutover".
    snowauth-server:
       image: snowd3n/snowauth:server
       container_name: snowauth-server
       restart: unless-stopped
       env_file:
            - .env
       ports:
            - 8084:8081
       # default keeps it reachable to snowauth-postgres/valkey; the shared network lets the
       # speed-dungeon lobby (a separate compose project) reach it at http://snowauth-server:8081
       networks:
            - default
            - speed-dungeon-shared
    snowauth-postgres:
       image: postgres:16
       volumes:
             - snowauth_pg_volume:/var/lib/postgresql/data
       env_file:
             - .env
       environment:
             - POSTGRES_USER:${POSTGRES_USER}
             - POSTGRES_PASSWORD:${POSTGRES_PASSWORD}
             - POSTGRES_DB:${POSTGRES_DB}
    snowauth-valkey:
       image: valkey/valkey
       container_name: valkey
       volumes:
             - snowauth_valkey_volume:/data

# shared with the speed-dungeon compose project (repo-root docker-compose.deploy.yml).
# created once on the box: docker network create speed-dungeon-shared
networks:
    speed-dungeon-shared:
        external: true
