# roguelikeracing.com — reverse proxy for the split speed-dungeon deploy.
#
# Backends (host-published ports from vps.docker.yml):
#   /                -> frontend (next)        localhost:3002   HTTP
#   /lobby           -> lobby WS               localhost:8083   WS   (NEXT_PUBLIC_WS_SERVER_URL)
#   /api             -> lobby REST             localhost:8083   HTTP (NEXT_PUBLIC_GAME_SERVER_URL)
#   /game-server-1   -> game server Lindblum   localhost:8088   WS   (GAME_SERVER_PUBLIC_URL)
#   /game-server-2   -> game server Alexandria localhost:8086   WS   (GAME_SERVER_PUBLIC_URL)
#   /asset           -> asset server           localhost:8087   HTTP (NEXT_PUBLIC_ASSET_SERVER_URL)
#   /auth            -> snowauth               localhost:8084   HTTP
#
# The asset server serves its routes under /api internally (appRoute prefixes /api in
# production), so /asset is rewritten to /api transparently.

server {
        server_name roguelikeracing.com www.roguelikeracing.com;

        location / {
             proxy_pass http://localhost:3002;
             proxy_set_header Host $host;
             proxy_set_header X-Forwarded-For $remote_addr;
             proxy_set_header X-Forwarded-Proto $scheme;
        }

        # lobby websocket — its own path so it is unambiguous against the frontend at /
        location /lobby {
             proxy_pass http://localhost:8083;
             proxy_http_version 1.1;
             proxy_set_header Upgrade $http_upgrade;
             proxy_set_header Connection "upgrade";
             proxy_set_header Host $host;
             proxy_set_header X-Forwarded-For $remote_addr;
             proxy_set_header X-Forwarded-Proto $scheme;
             proxy_read_timeout 3600s;
             proxy_send_timeout 3600s;
        }

        # lobby REST (profiles, ladders, game records)
        location /api {
             proxy_pass http://localhost:8083;
             proxy_set_header Host $host;
             proxy_set_header X-Forwarded-For $remote_addr;
             proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /game-server-1 {
             proxy_pass http://localhost:8088;
             proxy_http_version 1.1;
             proxy_set_header Upgrade $http_upgrade;
             proxy_set_header Connection "upgrade";
             proxy_set_header Host $host;
             proxy_set_header X-Forwarded-For $remote_addr;
             proxy_set_header X-Forwarded-Proto $scheme;
             proxy_read_timeout 3600s;
             proxy_send_timeout 3600s;
        }

        location /game-server-2 {
             proxy_pass http://localhost:8086;
             proxy_http_version 1.1;
             proxy_set_header Upgrade $http_upgrade;
             proxy_set_header Connection "upgrade";
             proxy_set_header Host $host;
             proxy_set_header X-Forwarded-For $remote_addr;
             proxy_set_header X-Forwarded-Proto $scheme;
             proxy_read_timeout 3600s;
             proxy_send_timeout 3600s;
        }

        # asset bytes — large binaries. More specific than /asset/ so it wins the match.
        # NOTE: deliberately no long browser cache. Asset urls are path-keyed, not
        # content-hashed, and the client already caches in IndexedDB keyed by manifest version,
        # so a long max-age here would let a browser serve stale bytes for an unchanged url after
        # a redeploy. Add `Cache-Control: immutable` only once asset urls carry a content hash.
        location /asset/assets/ {
             proxy_pass http://localhost:8087/api/assets/;
             proxy_set_header Host $host;
             proxy_set_header X-Forwarded-For $remote_addr;
             proxy_set_header X-Forwarded-Proto $scheme;
        }

        # asset manifest + gameplay facts (small, must stay fresh — it is the cache-bust signal)
        location /asset/ {
             proxy_pass http://localhost:8087/api/;
             proxy_set_header Host $host;
             proxy_set_header X-Forwarded-For $remote_addr;
             proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth {
             proxy_pass http://localhost:8084; # snowauth server
             proxy_set_header Host $host;
             proxy_set_header X-Forwarded-For $remote_addr;
             proxy_set_header X-Forwarded-Proto $scheme;
        }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/roguelikeracing.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/roguelikeracing.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
